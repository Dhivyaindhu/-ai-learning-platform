<!DOCTYPE html>
<html>
<head>
    <title>Login - AI Learning Platform</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(135deg, #ffe4ec, #fddde6);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        .login-box {
            width: 350px;
            padding: 30px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            text-align: center;
        }

        h2 {
            color: #d63384;
            margin-bottom: 20px;
        }

        .messages {
            margin-bottom: 15px;
        }

        .alert {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .alert-error {
            background-color: #ffe4ec;
            color: #d63384;
            border: 1px solid #d63384;
        }

        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        label {
            display: block;
            text-align: left;
            font-weight: 600;
            margin-bottom: 5px;
            color: #444;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
            outline: none;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #d63384;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #d63384;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            background: #b82b6f;
        }

        p {
            margin-top: 15px;
            font-size: 14px;
        }

        a {
            color: #d63384;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>Welcome Back</h2>

    <!-- Display Messages -->
    {% if messages %}
    <div class="messages">
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <label for="id_email">Email</label>
        {{ form.email }}

        <label for="id_password">Password</label>
        {{ form.password }}

        <button type="submit">Login</button>
    </form>

    <p>
        Don't have an account?
        <a href="{% url 'register' %}">Register here</a>
    </p>

    <p>
        <a href="{% url 'home' %}">← Back to Home</a>
    </p>
</div>

</body>
</html>
